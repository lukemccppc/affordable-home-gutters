<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 100" fill="none">
  <!-- House icon -->
  <!-- Roof / chevron -->
  <path d="M22 48 L52 18 L82 48" stroke="white" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- House body -->
  <rect x="30" y="46" width="44" height="36" rx="5" stroke="white" stroke-width="5" fill="none"/>
  <!-- 2x2 window grid -->
  <rect x="40" y="54" width="11" height="11" rx="2.5" stroke="white" stroke-width="3.5" fill="none"/>
  <rect x="53" y="54" width="11" height="11" rx="2.5" stroke="white" stroke-width="3.5" fill="none"/>
  <rect x="40" y="67" width="11" height="11" rx="2.5" stroke="white" stroke-width="3.5" fill="none"/>
  <rect x="53" y="67" width="11" height="11" rx="2.5" stroke="white" stroke-width="3.5" fill="none"/>
  <!-- Curved arc / gutter below house -->
  <path d="M28 90 Q52 108 76 90" stroke="white" stroke-width="5.5" stroke-linecap="round" fill="none"/>

  <!-- "Affordable Home" text -->
  <text x="105" y="62" font-family="Inter, Arial, sans-serif" font-weight="700" font-size="32" fill="white" letter-spacing="-0.5">Affordable Home</text>
</svg>
